name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  memory-gate:
    name: Streaming memory regression gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      # Fails the build if the bounded-memory streaming path regresses past
      # 1.5x payload amplification (peakRSS - baseline) / payload. 64 MiB keeps
      # the VM baseline noise well under the gate while finishing in ~1 minute.
      - name: Enforce streaming peak-RSS gate
        run: >-
          PQFORGE_BENCH=1 PQFORGE_BENCH_MODE=streaming PQFORGE_BENCH_MB=64
          PQFORGE_BENCH_PROFILES=maximum PQFORGE_BENCH_ENFORCE=1
          dart test -t benchmark test/benchmark_io_test.dart

  verify:
    name: Analyze, test, examples, and package dry run
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Print Dart version
        run: dart --version

      - name: Install dependencies
        run: dart pub get

      - name: Verify generated visibility files
        run: dart run tool/visibility/generate_visibility.dart --check

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze source
        run: dart analyze

      - name: Run tests
        run: dart test

      - name: Run examples
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          printf 'pqforge file example\n' > "$tmp/input.txt"

          dart run example/pqforge_example.dart
          dart run example/file_encryption_example.dart "$tmp/input.txt" "$tmp/output.pqf" "$tmp/wrapped-key.json"
          dart run example/hybrid_combiner_example.dart
          dart run example/secure_session_example.dart
          dart run example/hybrid_key_agreement_example.dart
          dart run example/catalog_recipes_example.dart

      - name: Run wrapped-key CLI smoke
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          export PQFORGE_PASSPHRASE='ci-smoke-passphrase'
          printf 'hello pqforge cli\n' > "$tmp/plain.txt"
          mkdir -p "$tmp/folder/docs"
          printf 'folder secret\n' > "$tmp/folder/docs/report.txt"
          dart run pqforge keygen --profile compact --key-id ci --out-dir "$tmp/keys" --classical ed25519 --classical ecdsa-p256 --passphrase-env PQFORGE_PASSPHRASE
          dart run pqforge encrypt --recipient-public "$tmp/keys/ci.kem.public.json" --in "$tmp/plain.txt" --out "$tmp/plain.pqf" --profile compact
          dart run pqforge decrypt --recipient-secret "$tmp/keys/ci.kem.secret.wrapped.json" --passphrase-env PQFORGE_PASSPHRASE --in "$tmp/plain.pqf" --out "$tmp/opened.txt"
          cmp "$tmp/plain.txt" "$tmp/opened.txt"
          dart run pqforge encrypt-folder --recipient-public "$tmp/keys/ci.kem.public.json" --in-dir "$tmp/folder" --out-dir "$tmp/folder.pqf" --profile compact
          dart run pqforge decrypt-folder --recipient-secret "$tmp/keys/ci.kem.secret.wrapped.json" --passphrase-env PQFORGE_PASSPHRASE --in-dir "$tmp/folder.pqf" --out-dir "$tmp/folder.open"
          cmp "$tmp/folder/docs/report.txt" "$tmp/folder.open/docs/report.txt"
          dart run pqforge encrypt-text --recipient-public "$tmp/keys/ci.kem.public.json" --text 'private memo' --text-id memo --out "$tmp/memo.pqf" --profile compact
          dart run pqforge decrypt-text --recipient-secret "$tmp/keys/ci.kem.secret.wrapped.json" --passphrase-env PQFORGE_PASSPHRASE --in "$tmp/memo.pqf" --out "$tmp/memo.txt"
          grep -q 'private memo' "$tmp/memo.txt"
          # Hybrid signatures: ML-DSA + Ed25519 and ML-DSA + ECDSA-P256
          dart run pqforge hybrid-sign --signer-secret "$tmp/keys/ci.sign.secret.wrapped.json" --classical-secret "$tmp/keys/ci.ed25519.secret.wrapped.json" --passphrase-env PQFORGE_PASSPHRASE --in "$tmp/plain.txt" --out "$tmp/h-ed.json"
          dart run pqforge hybrid-verify --signer-public "$tmp/keys/ci.sign.public.json" --classical-public "$tmp/keys/ci.ed25519.public.json" --in "$tmp/plain.txt" --signature "$tmp/h-ed.json"
          dart run pqforge hybrid-sign --signer-secret "$tmp/keys/ci.sign.secret.wrapped.json" --classical-secret "$tmp/keys/ci.ecdsa-p256.secret.wrapped.json" --passphrase-env PQFORGE_PASSPHRASE --in "$tmp/plain.txt" --out "$tmp/h-ec.json" --context ci-rel
          dart run pqforge hybrid-verify --signer-public "$tmp/keys/ci.sign.public.json" --classical-public "$tmp/keys/ci.ecdsa-p256.public.json" --in "$tmp/plain.txt" --signature "$tmp/h-ec.json"
          # Standalone ECDSA-P256
          dart run pqforge ecdsa-sign --secret "$tmp/keys/ci.ecdsa-p256.secret.wrapped.json" --passphrase-env PQFORGE_PASSPHRASE --in "$tmp/plain.txt" --out "$tmp/ec.json"
          dart run pqforge ecdsa-verify --public "$tmp/keys/ci.ecdsa-p256.public.json" --in "$tmp/plain.txt" --signature "$tmp/ec.json"
          # Negative check: a tampered payload must fail verification (non-zero exit)
          printf 'tampered\n' > "$tmp/tampered.txt"
          if dart run pqforge ecdsa-verify --public "$tmp/keys/ci.ecdsa-p256.public.json" --in "$tmp/tampered.txt" --signature "$tmp/ec.json"; then echo "tamper not detected" && exit 1; fi

      - name: Package dry run
        run: dart pub publish --dry-run
