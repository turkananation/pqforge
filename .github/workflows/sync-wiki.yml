name: Sync Wiki

on:
  push:
    branches:
      - main
      - develop
      - feat/hybrid-combiner-secure-session
    paths:
      - "wiki/**"
      - ".github/workflows/sync-wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-wiki-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-wiki:
    name: Push wiki/ to GitHub Wiki
    runs-on: ubuntu-latest
    if: github.repository == 'turkananation/pqforge'
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone wiki repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki-repo

      - name: Sync wiki content
        run: |
          find wiki-repo -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R wiki/. wiki-repo/

      - name: Commit and push wiki changes
        working-directory: wiki-repo
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Wiki already up to date."
            exit 0
          fi
          git add --all
          git commit -m "Sync wiki from ${GITHUB_SHA}"
          git push
