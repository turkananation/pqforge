  Pure-Dart post-quantum and classical hybrid crypto for Dart, Flutter, and
  Serverpod: ML-KEM/ML-DSA envelopes, streaming, multi-recipient encryption,
  signing, and a CLI.
version: 0.2.0
repository: https://github.com/turkananation/pqforge

environment:
  sdk: ^3.12.0

dependencies:
  args: ^2.7.0
  pqcrypto: ^0.3.1
  pointycastle: ^4.0.0
  cryptography: ^2.9.0

executables:
  pqforge: pqforge

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
